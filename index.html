<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ESCAPE FROM THE DARK</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: #fff; overflow: hidden; font-family: "serif"; }
        
        /* 懐中電灯エフェクト */
        #light-mask {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle 150px at var(--x) var(--y), transparent 0%, rgba(0,0,0,0.98) 100%);
            pointer-events: none; z-index: 10;
        }

        #game-container { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }

        /* 調べる対象（隠されている） */
        .object {
            position: absolute; cursor: pointer; opacity: 0.1; /* 懐中電灯がないとほぼ見えない */
            transition: opacity 0.3s; color: #444; border: 1px dashed #222; padding: 10px;
        }
        .object:hover { opacity: 1; color: #fff; border-color: #800; }

        /* メッセージ表示 */
        #msg-box {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 80%; background: rgba(0,0,0,0.8); border: 1px solid #800;
            padding: 20px; z-index: 20; display: none; text-shadow: 0 0 5px #f00;
        }
    </style>
</head>
<body style="--x: 50%; --y: 50%;">

    <div id="light-mask"></div>

    <div id="game-container">
        <!-- 部屋のオブジェクト -->
        <div class="object" style="top: 20%; left: 30%;" onclick="check('desk')">[ 古びた机 ]</div>
        <div class="object" style="top: 60%; left: 70%;" onclick="check('door')">[ 鉄の扉 ]</div>
        <div class="object" style="top: 40%; left: 50%;" onclick="check('memo')">[ 紙切れ ]</div>
    </div>

    <div id="msg-box" onclick="this.style.display='none'"></div>

    <script>
        let hasKey = false;
        const msgBox = document.getElementById('msg-box');

        // 懐中電灯の追従
        document.addEventListener('mousemove', e => {
            document.body.style.setProperty('--x', e.clientX + 'px');
            document.body.style.setProperty('--y', e.clientY + 'px');
        });

        function showMsg(text) {
            msgBox.innerText = text;
            msgBox.style.display = 'block';
        }

        function check(target) {
            if (target === 'desk') {
                showMsg('机の引き出しの奥に「錆びた鍵」を見つけた。');
                hasKey = true;
            } else if (target === 'memo') {
                showMsg('「…出タイナラ、鍵ヲ探セ…」血のような文字で書かれている。');
            } else if (target === 'door') {
                if (hasKey) {
                    showMsg('鍵が合った！扉が重々しく開き、あなたは脱出に成功した。');
                    setTimeout(() => alert('HAPPY ENDING'), 1000);
                } else {
                    showMsg('鍵がかかっている。どこかに鍵があるはずだ。');
                }
            }
        }
    </script>
</body>
</html>
